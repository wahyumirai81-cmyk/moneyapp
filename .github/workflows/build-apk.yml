name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Ekstrak file zip proyek
        run: unzip -o moneyapp.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Buat APK Debug
        working-directory: moneyapp/android
        run: gradle assembleDebug --stacktrace

      - name: Unggah APK sebagai artefak
        uses: actions/upload-artifact@v4
        with:
          name: reward-app-debug-apk
          path: moneyapp/android/app/build/outputs/apk/debug/app-debug.apk
